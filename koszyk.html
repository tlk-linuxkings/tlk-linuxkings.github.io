    .cart-container { display: flex; gap:2rem; max-width:1200px; margin:2rem auto; }

    .cart-summary { flex:1; }
    .cart-empty { text-align:center; padding:3rem 0; color:var(--text-dark); }
    .cart-item { display:flex; gap:1rem; align-items:center; margin-bottom:1rem; }
    .cart-item img { width:80px; height:80px; object-fit:cover; border-radius:4px; }
    .cart-item-info { flex:1; }
    .cart-item-controls { display:flex; gap:.5rem; }
    .cart-summary h2 { margin-bottom:1rem; }
    .cart-summary button { width:100%; margin-top:1rem; }
  </style>

  <main>
    
    <div class="cart-container">
      <!-- LEWA KOLUMNA: produkty -->
      <div class="cart-items" id="cartItems">
        <!-- tu JS wstawi kafelki .cart-item -->
      </div>
      <!-- PRAWA KOLUMNA: podsumowanie -->
      <aside class="cart-summary" id="cartSummary">
        <!-- tu JS wstawi summary -->
      </aside>
    </div>
  </main>
  

  <footer class="site-footer">© 2025 Linux_kings</footer>

  <!-- skrypty: najpierw products.js, potem cart.js, potem to: -->
  <script src="js/products.js"></script>
  <script src="js/cart.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', renderCart);
    
    function renderCart() {
      const cart      = getCart();
      const itemsWrap = document.getElementById('cartItems');
      const sumWrap   = document.getElementById('cartSummary');
      itemsWrap.innerHTML = '';
      sumWrap.innerHTML   = '';
    
      let total = 0;
    
      // Lewa kolumna: kafelki
      cart.forEach(({ id, qty }) => {
        const p = PRODUCTS.find(x => x.id === id);
        if (!p) return;
        const lineTotal = p.price * qty;
        total += lineTotal;
    
        const card = document.createElement('div');
        card.className = 'cart-item';
        card.innerHTML = `
          <img src="${p.gridImage}" alt="${p.type}">
          <div class="info">
            <h3>${p.type}${p.pattern}</h3>
            <p class="price">${p.price} PLN</p>
            <div class="controls">
              <button class="qty-btn" data-id="${id}" data-change="-1">−</button>
              <span class="qty">${qty}</span>
              <button class="qty-btn" data-id="${id}" data-change="1">＋</button>
            </div>
            <button class="remove-btn" data-id="${id}">Usuń</button>
          </div>
        `;
        itemsWrap.appendChild(card);
      });
    
      // Prawa kolumna: podsumowanie
      sumWrap.innerHTML = `
        <h2>Podsumowanie</h2>
        <p class="summary-line">Łącznie: <strong>${total} PLN</strong></p>
        <button class="btn btn-primary btn-block">Przejdź do dostawy</button>
        <hr>
        <a href="konto.html" class="summary-link">Zaloguj się</a>
        <a href="" class="summary-link">Zarejestruj się</a>
        <a href="" class="summary-link">Regulamin sklepu</a>
      `;
    
      // Podłącz eventy
      itemsWrap.querySelectorAll('.qty-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const id     = btn.dataset.id;
          const change = Number(btn.dataset.change);
          const item   = getCart().find(x => x.id === id);
          updateQuantity(id, item.qty + change);
          renderCart();
        });
      });
      itemsWrap.querySelectorAll('.remove-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          removeFromCart(btn.dataset.id);
          renderCart();
        });
      });
    }
    </script>
