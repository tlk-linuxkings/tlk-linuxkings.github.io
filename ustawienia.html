<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Linux_kings – Ustawienia</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="js/cart.js"></script>
  <style>
    .settings-container {
      max-width:800px; margin:2rem auto; padding:2rem;
      background:var(--bg-light); border-radius:8px;
      box-shadow:0 2px 8px rgba(0,0,0,0.1);
    }
    .settings-container h2 { margin-bottom:1rem; }
    .setting { margin-bottom:1.5rem; }
    .setting label { display:block; margin-bottom:.5rem; font-weight:500; }
    .setting input[type="range"] { width:100%; }
    .setting select, .setting input[type="text"] {
      width:100%; padding:.5rem; border:1px solid #ccc; border-radius:4px;
    }
  </style>
</head>
<body>
  <!-- HEADER -->
  <header class="site-header">
    <div class="header-inner">
      <a href="index.html" class="logo">Linux_kings</a>
      <nav>
        <ul class="nav-list grouped">
          <!-- Grupa 1: Home + Sklep (tylko Sklep z ikoną) -->
          <li class="nav-group">
          </li>
          <!-- Grupa 2: Matches + Team (bez ikon) -->
          <li class="nav-group">
            <a href="team.html"></a>
            <a href="contact.html"><i class="icon-contact"></i> </a>
          </li>
          <li class="divider">|</li>
          <!-- Grupa 3: Koszyk, Konto, Contact, Ustawienia (wszystkie z ikonami) -->
          <li class="nav-group">
            <li class="dropdown">
              <a href="jerseys.html"></a>
              <ul class="dropdown-menu">
                <li><a href="jerseys.html?type=koszulka">Koszulki</a></li>
                <li><a href="jerseys.html?type=longsleeve">Longsleeve</a></li>
                <li><a href="jerseys.html?type=bluza">Bluzy</a></li>
                <li><a href="jerseys.html?type=spodenki">Spodenki</a></li>
                <li><a href="jerseys.html?type=akcesoria">Akcesoria</a></li>
              </ul>
            </li>
            <a href="koszyk.html" class="cart-link">
              <i class="fas fa-shopping-cart"></i>
              <span class="cart-badge" id="cartCount"></span>
            </a>
          </li>
            <li class="nav-group">
              <li class="divider">|</li>
              <a href="matches.html"></a>
            </li>
        </ul>
      </nav>
      
    </div>
    <nav class="mobile-nav">
      <button class="hamburger" aria-label="Otwórz menu">
        <span></span><span></span><span></span>
      </button>
      <ul class="mobile-nav__list">
        <li><a href="team.html">Drużyna</a></li>
        <li><a href="contact.html">Kontakt</a></li>
        <hr class="mobile-divider">
        <li><a href="jerseys.html">Sklep</a></li>
        <li><a href="koszyk.html">Koszyk</a></li>
        <hr class="mobile-divider">
        <li><a href="matches.html">Rozgrywki</a></li>
      </ul>
    </nav>
    
  </header>

  <main>
    <div class="settings-container">
      <h2>Ustawienia konta</h2>

      <!-- 1. Motyw -->
<div class="setting">
    <label for="theme">Motyw kolorystyczny</label>
    <select id="theme">
      <option value="light">Jasny</option>
      <option value="dark">Ciemny</option>
    </select>
  </div>
  
  <!-- 2. Czcionka -->
  <div class="setting">
    <label for="font-size">Rozmiar czcionki</label>
    <input type="range" id="font-size" min="12" max="24" value="16">
    <span id="font-size-val">16px</span>
  </div>
  
  <!-- 3. Język -->
  <div class="setting">
    <label for="language">Język interfejsu</label>
    <select id="language">
      <option value="pl">Polski</option>
      <option value="en">English</option>
    </select>
  </div>
  
  <!-- 4. Autologowanie -->
  <div class="setting">
    <input type="checkbox" id="autologin">
    <label for="autologin">Zapamiętaj mnie</label>
  </div>
  
  <!-- 5. Powiadomienia -->
  <div class="setting">
    <input type="checkbox" id="notifications">
    <label for="notifications">Powiadomienia push</label>
  </div>
  
  <!-- 6. API / cache -->
  <div class="setting">
    <input type="checkbox" id="fast-api">
    <label for="fast-api">Przyspieszone ładowanie (cache)</label>
  </div>
  
  <!-- 7. Newsletter -->
  <div class="setting">
    <label>Newsletter:</label>
    <select id="newsletter-frequency">
      <option value="off">Nie zapisuj mnie</option>
      <option value="weekly">Co tydzień</option>
      <option value="monthly">Co miesiąc</option>
    </select>
  </div>
  
  <!-- 8. Prywatność -->
  <div class="setting">
    <input type="checkbox" id="analytics">
    <label for="analytics">Włącz analitykę</label>
  </div>
  
  <!-- 9. Region -->
  <div class="setting">
    <label for="region">Region dostawy</label>
    <select id="region">
      <option value="pl">Polska</option>
      <option value="de">Niemcy</option>
      <option value="us">USA</option>
    </select>
  </div>
  
  <!-- 10. Zapisane adresy -->
  <div class="setting">
    <label for="addresses">Adres(y) dostawy (prototyp)</label>
    <input type="text" id="addresses" placeholder="np. ul. Przykładowa 1, Warszawa">
  </div>
  
  <!-- 11. Płatność -->
  <div class="setting">
    <label for="payment">Domyślna metoda płatności</label>
    <select id="payment">
      <option value="card">Karta</option>
      <option value="paypal">PayPal</option>
      <option value="transfer">Przelew</option>
    </select>
  </div>
  
  <!-- 12. Sortowanie sklepu -->
  <div class="setting">
    <label for="sort">Domyślne sortowanie</label>
    <select id="sort">
      <option value="popular">Popularność</option>
      <option value="price-low">Cena rosnąco</option>
      <option value="price-high">Cena malejąco</option>
    </select>
  </div>
  
  <!-- 13. Domyślna kategoria -->
  <div class="setting">
    <label for="default-cat">Domyślna kategoria w sklepie</label>
    <select id="default-cat">
      <option value="koszulka">Koszulki</option>
      <option value="bluza">Bluzy</option>
      <option value="spodenki">Spodenki</option>
      <option value="akcesoria">Akcesoria</option>
    </select>
  </div>
  
  <!-- 14. Tryb danych -->
  <div class="setting">
    <input type="checkbox" id="low-data">
    <label for="low-data">Tryb oszczędzania danych (obrazy niskiej jakości)</label>
  </div>
  
  <!-- 15. Widok -->
  <div class="setting">
    <label for="layout">Układ sklepu</label>
    <select id="layout">
      <option value="grid">Siatka</option>
      <option value="list">Lista</option>
    </select>
  </div>
  

      <button class="btn btn-primary">Zapisz zmiany</button>
    </div>
    <button onclick="topFunction()" id="Btn" title="Go to top">^</button>
  </main>

  <footer class="site-footer">© 2025 Linux_kings</footer>
  <script src="js/script.js"></script>
  <script src="js/menu.js"></script>
  <script>
    
    // Przykładowa logika podglądu font-size
    const fontInput = document.getElementById('font-size'),
          fontVal   = document.getElementById('font-size-val');
    fontInput.addEventListener('input', e => {
      fontVal.textContent = e.target.value + 'px';
      document.documentElement.style.fontSize = e.target.value + 'px';
    });
  </script>
  
</body>
</html>
